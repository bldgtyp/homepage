# Deploy homepage to Dreamhost via FTP
# Triggered on push to main branch
# Only uploads files — never deletes existing server content (safe for /Proj_* directories)

name: Deploy to Dreamhost

on:
  push:
    branches: [master]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Upload to Dreamhost
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via LFTP
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" \
               sftp://${{ secrets.FTP_HOST }} -e "
            set net:timeout 30;
            set net:max-retries 3;
            set sftp:auto-confirm yes;
            mirror --reverse --only-newer --verbose \
              ./site/ /home/dh_23t94q/bldgtyp.com/;
            bye
          "
